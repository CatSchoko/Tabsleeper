<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Tab schläft</title>
<style>
  html, body {
    height: 100%; margin: 0;
    background: #1c1c1e; color: #f2f2f2;
    font-family: -apple-system, system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .card { text-align: center; max-width: 360px; padding: 24px; }
  .moon { font-size: 42px; margin-bottom: 12px; }
  img.favicon { width: 20px; height: 20px; vertical-align: middle; margin-right: 6px; border-radius: 4px; }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 4px; word-break: break-word; }
  .host { font-size: 12px; color: #9a9aa0; margin-bottom: 22px; }
  button {
    cursor: pointer; border: none; border-radius: 10px;
    padding: 12px 28px; font-size: 14px; font-weight: 600;
    background: #4a9eff; color: white;
  }
  button:hover { filter: brightness(1.1); }
  .hint { font-size: 11px; color: #6b6b70; margin-top: 16px; }
</style>
</head>
<body>
  <div class="card">
    <div class="moon">🌙</div>
    <h1><img class="favicon" id="favicon" style="display:none;"><span id="title">Dieser Tab schläft</span></h1>
    <div class="host" id="host"></div>
    <button id="wakeBtn">Wake</button>
    <div class="hint">Der Tab wurde entladen, um Arbeitsspeicher zu sparen.</div>
  </div>
  <script src="sleep.js"></script>
</body>
</html>
